    <rect x="14" y="34" width="32" height="6" rx="1" fill="#cbd5e1"/>
  </g>
  <!-- HEPHAESTUS Text -->
  <text x="72" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold" fill="#e2e8f0" letter-spacing="3">HEPHAESTUS</text>
