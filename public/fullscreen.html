<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring View - Fullscreen Slideshow</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    #player-frame-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #1a1a1a;
    }
    
    /* Top thin progress bar */
    #progress-bar-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      z-index: 1000;
    }
    
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #a48181; /* matches --prometheus-orange */
      transition: width 0.1s linear;
      box-shadow: 0 0 8px #a48181;
    }
    
    /* Floating controls */
    #floating-controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      transition: opacity 0.4s ease, transform 0.4s ease;
      opacity: 1;
    }
    
    #floating-controls:hover {
      opacity: 1 !important;
    }
    
    .control-info {
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 150px;
    }
    
    .control-title {
      font-size: 12px;
      font-weight: 700;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    
    .control-status {
      font-size: 10px;
      color: #a0a0a0;
      margin-top: 2px;
    }
    
    .control-buttons {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .btn-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      outline: none;
    }
    
    .btn-circle:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #a48181;
      transform: scale(1.05);
    }
    
    .btn-play {
      background: #a48181;
      border-color: #a48181;
      color: #ffffff;
    }
    
    .btn-play:hover {
      background: #bfa3a3;
      border-color: #bfa3a3;
    }
    
    /* Error display overlay */
    #error-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      z-index: 999;
      gap: 16px;
    }
    
    .error-card {
      background: #242424;
      border: 1px solid #3c3c3c;
      border-radius: 8px;
      padding: 30px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <!-- Thin Top Progress Bar -->
  <div id="progress-bar-wrapper">
    <div id="progress-bar"></div>
  </div>

  <!-- Main Iframe Container -->
  <div id="player-frame-container">
    <iframe id="slideshow-iframe" allowfullscreen></iframe>
  </div>

  <!-- Hover trigger zone at the bottom of the screen to reveal controls -->
  <div id="controls-hover-trigger" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 20px; z-index: 998; background: transparent;"></div>

  <div id="floating-controls">
    <div class="control-info">
      <div class="control-title" id="lbl-title">Loading View...</div>
      <div class="control-status" id="lbl-status">-</div>
    </div>
    
    <div class="control-buttons">
      <button class="btn-circle" onclick="prevSlide()" title="Previous Panel" style="display: flex; align-items: center; justify-content: center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
      </button>
      <button class="btn-circle btn-play" id="btn-play" onclick="togglePlay()" title="Play/Pause" style="display: flex; align-items: center; justify-content: center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
      </button>
      <button class="btn-circle" onclick="nextSlide()" title="Next Panel" style="display: flex; align-items: center; justify-content: center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
      </button>
    </div>
    
    <div style="height: 24px; border-left: 1px solid rgba(255,255,255,0.15);"></div>

    <button class="btn-circle" id="btn-native-fs" onclick="toggleNativeFullscreen()" title="Toggle Fullscreen" style="display: flex; align-items: center; justify-content: center;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
    </button>
    
    <button class="btn-circle" onclick="closeFullscreen()" title="Close Slideshow" style="background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); color: #ff7b72; display: flex; align-items: center; justify-content: center;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <!-- Error Overlay (Hidden by default) -->
  <div id="error-overlay" class="hidden">
    <div class="error-card">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ff7b72" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 16px auto; display: block;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      <h2 style="margin: 0 0 8px 0; color: #ff7b72;">Failed to Load View</h2>
      <p id="error-message" style="color: #a0a0a0; font-size: 13px; line-height: 1.5; margin-bottom: 20px;">Could not retrieve the requested monitoring view.</p>
      <button class="btn btn-secondary" onclick="window.close()" style="padding: 8px 16px;">Close Tab</button>
    </div>
  </div>

  <script>
    let viewData = null;
    let currentSlideIndex = 0;
    let slideshowActive = true;
    let slideshowTimer = null;
    let slideshowDurationSetting = 10; // default
    let slideshowRemainingTime = 0;
    
    // Auto-hide controls timeout
    let controlHideTimeout;

    window.addEventListener('DOMContentLoaded', () => {
      initPlayer();
      setupAutoHideControls();

      // Auto fullscreen on first click anywhere
      document.addEventListener('click', function autoFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
        document.removeEventListener('click', autoFullscreen);
      });
    });

    async function initPlayer() {
      const hashId = window.location.hash.replace('#', '');
      if (!hashId) {
        showError('No monitoring view ID provided in URL hash.');
        return;
      }

      try {
        const response = await fetch(`/api/v1/monitoring-views`);
        const result = await response.json();
        
        if (response.ok && result.success) {
          const list = result.data || [];
          viewData = list.find(v => v.id === hashId);
          
          if (!viewData) {
            showError('The requested monitoring view could not be found.');
            return;
          }
          
          if (!viewData.urls || viewData.urls.length === 0) {
            showError('No panel URLs configured in this monitoring view.');
            return;
          }
          
          slideshowDurationSetting = viewData.slideDuration || 10;
          renderCurrentSlide();
          startSlideshowTimer();
        } else {
          showError(result.message || 'Failed to fetch monitoring views from server.');
        }
      } catch (error) {
        showError('Connection error: ' + error.message);
      }
    }

    function renderCurrentSlide() {
      if (!viewData) return;
      
      const iframe = document.getElementById('slideshow-iframe');
      const lblTitle = document.getElementById('lbl-title');
      const lblStatus = document.getElementById('lbl-status');
      
      const url = viewData.urls[currentSlideIndex];
      const cleanedUrl = getEmbedUrl(url);
      
      iframe.src = cleanedUrl;
      lblTitle.textContent = viewData.title;
      
      if (viewData.urls.length <= 1) {
        lblStatus.textContent = '1 Panel (Rotation Inactive)';
      } else {
        lblStatus.textContent = `Panel ${currentSlideIndex + 1} of ${viewData.urls.length}`;
      }
    }

    function startSlideshowTimer() {
      stopSlideshowTimer();
      if (!viewData || viewData.urls.length <= 1) {
        slideshowRemainingTime = 0;
        const progressBar = document.getElementById('progress-bar');
        if (progressBar) progressBar.style.width = '100%';
        return;
      }
      slideshowRemainingTime = slideshowDurationSetting;
      updateProgressBar();
      
      slideshowTimer = setInterval(() => {
        slideshowRemainingTime--;
        if (slideshowRemainingTime <= 0) {
          nextSlide();
        } else {
          updateProgressBar();
        }
      }, 1000);
    }

    function stopSlideshowTimer() {
      if (slideshowTimer) {
        clearInterval(slideshowTimer);
        slideshowTimer = null;
      }
    }

    function updateProgressBar() {
      const progressBar = document.getElementById('progress-bar');
      if (progressBar) {
        if (!viewData || viewData.urls.length <= 1) {
          progressBar.style.width = '100%';
        } else {
          const percent = ((slideshowDurationSetting - slideshowRemainingTime) / slideshowDurationSetting) * 100;
          progressBar.style.width = `${percent}%`;
        }
      }
    }

    function togglePlay() {
      slideshowActive = !slideshowActive;
      const btnPlay = document.getElementById('btn-play');
      
      if (slideshowActive) {
        btnPlay.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
        startSlideshowTimer();
      } else {
        btnPlay.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`;
        stopSlideshowTimer();
      }
    }

    function nextSlide() {
      if (!viewData || viewData.urls.length <= 1) return;
      currentSlideIndex = (currentSlideIndex + 1) % viewData.urls.length;
      renderCurrentSlide();
      if (slideshowActive) {
        startSlideshowTimer();
      } else {
        updateProgressBar();
      }
    }

    function prevSlide() {
      if (!viewData || viewData.urls.length <= 1) return;
      currentSlideIndex = (currentSlideIndex - 1 + viewData.urls.length) % viewData.urls.length;
      renderCurrentSlide();
      if (slideshowActive) {
        startSlideshowTimer();
      } else {
        updateProgressBar();
      }
    }

    function toggleNativeFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.log(`Error attempting to enable full-screen mode: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    function closeFullscreen() {
      window.close();
    }

    function showError(msg) {
      document.getElementById('error-message').textContent = msg;
      document.getElementById('error-overlay').classList.remove('hidden');
    }

    function getEmbedUrl(url) {
      try {
        let u = new URL(url);
        if (!u.searchParams.has('embed')) {
          u.searchParams.set('embed', 'true');
        }
        // Automatically apply kiosk mode to full Grafana dashboards to hide the top/left navigation bars
        if (u.pathname.includes('/d/') && !u.pathname.includes('/d-solo/')) {
          if (!u.searchParams.has('kiosk')) {
            u.searchParams.set('kiosk', 'true');
          }
        }
        return u.toString();
      } catch (e) {
        let result = url;
        if (!result.includes('embed=')) {
          result += (result.includes('?') ? '&' : '?') + 'embed=true';
        }
        if (result.includes('/d/') && !result.includes('/d-solo/') && !result.includes('kiosk=')) {
          result += '&kiosk=true';
        }
        return result;
      }
    }

    // Auto-hide toolbar logic
    function setupAutoHideControls() {
      const controls = document.getElementById('floating-controls');
      const trigger = document.getElementById('controls-hover-trigger');
      
      function showControls() {
        controls.style.opacity = '1';
        controls.style.transform = 'translateX(-50%) translateY(0)';
        controls.style.pointerEvents = 'auto';
        
        clearTimeout(controlHideTimeout);
        
        if (slideshowActive) {
          controlHideTimeout = setTimeout(() => {
            controls.style.opacity = '0';
            controls.style.transform = 'translateX(-50%) translateY(30px)';
            controls.style.pointerEvents = 'none';
          }, 3000);
        }
      }
      
      // Start the timer immediately on load
      showControls();
      
      // Listen to events on parent document
      document.addEventListener('mousemove', showControls);
      document.addEventListener('click', showControls);
      
      // Listen to events on the bottom trigger zone
      if (trigger) {
        trigger.addEventListener('mousemove', showControls);
      }
    }
  </script>
</body>
</html>
