version: '3.8'

services:
  hephaestus-db:
    image: postgres:15-alpine
    container_name: hephaestus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-hephaestus}
      POSTGRES_PASSWORD: ${PGPASSWORD:?Please set PGPASSWORD in .env file}
      POSTGRES_DB: ${PGDATABASE:-hephaestus}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - hephaestus-db-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  hephaestus-backend:
    image: hephaestus-backend:latest
    container_name: hephaestus-backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - PGHOST=hephaestus-db
      - PGPORT=5432
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://192.168.201.18:5000,https://hephaestus-tools.honet.web.id
    depends_on:
      - hephaestus-db
    volumes:
      - hephaestus-backend-data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"

volumes:
  hephaestus-db-data:
  hephaestus-backend-data:
