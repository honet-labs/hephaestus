version: '3.8'

services:
  hephaestus-db:
    image: postgres:15-alpine
    container_name: hephaestus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hephaestus
    ports:
      - "5435:5432"
    volumes:
      - hephaestus-db-data:/var/lib/postgresql/data

  hephaestus-backend:
    image: hephaestus-backend:latest
    container_name: hephaestus-backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - PGHOST=hephaestus-db
      - PGPORT=5432
    depends_on:
      - hephaestus-db
    volumes:
      - hephaestus-backend-data:/app/data

volumes:
  hephaestus-db-data:
  hephaestus-backend-data:
