<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Host - Hephaestus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --background: #242424;
            --foreground: #cbd5e1;
            --app-sidebar: rgb(65, 73, 81);
            --app-topbar: #1e1e1e;
            --app-card: #2e2e2e;
            --app-card-dark: #1f1f1f;
            --app-border: #3c3c3c;
            --text-white: #ffffff;
            --text-muted: #a0a0a0;
            --btn-primary-bg: #1971c2;
            --btn-primary-color: #ffffff;
            --btn-primary-hover: #1864ab;
            --prometheus-orange: #a48181;
            --success: #10b981;
            --success-border: rgba(16, 185, 129, 0.3);
            --error: #ef4444;
            --error-border: rgba(239, 68, 68, 0.3);
            --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, button, input, select, textarea, span, p, a, label {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            font-size: 13px;
        }
        body {
            background-color: var(--background);
            color: var(--foreground);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        h1, h2, h3, h4 { font-weight: 600; color: var(--text-white); }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; background: var(--app-topbar); border-bottom: 1px solid var(--app-border);
            flex-shrink: 0; height: 42px;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header h1 { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header h1 svg { width: 16px; height: 16px; color: var(--prometheus-orange); }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .back-link {
            color: var(--text-muted); text-decoration: none; font-size: 11px;
            padding: 4px 10px; border: 1px solid var(--app-border); border-radius: 4px;
            transition: all 0.2s;
        }
        .back-link:hover { color: var(--text-white); border-color: var(--text-muted); }

        .search-bar { padding: 12px 20px; flex-shrink: 0; }
        .search-bar input {
            width: 100%; background: var(--app-card-dark); border: 1px solid var(--app-border);
            color: var(--text-white); padding: 8px 12px; border-radius: 4px;
            font-size: 13px; outline: none; transition: border-color 0.2s;
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-bar input:focus { border-color: var(--prometheus-orange); }

        .toolbar {
            display: flex; align-items: center; padding: 0 20px; gap: 12px;
            flex-shrink: 0; margin-bottom: 8px;
        }
        button.btn {
            border-radius: 4px; padding: 8px 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
            font-size: 11px; letter-spacing: 0.5px; display: inline-flex;
            align-items: center; gap: 6px; border: 1px solid transparent;
        }
        button.btn-primary { background-color: var(--btn-primary-bg); color: var(--btn-primary-color); }
        button.btn-primary:hover:not(:disabled) { background-color: var(--btn-primary-hover); }
        button.btn-secondary { background-color: var(--app-card-dark); border: 1px solid var(--app-border); color: var(--foreground); }
        button.btn-secondary:hover:not(:disabled) { color: white; background-color: #333333; border-color: var(--prometheus-orange); }
        button.btn-danger { background-color: rgba(248, 81, 73, 0.12); border: 1px solid var(--error-border); color: #ff7b72; }
        button.btn-danger:hover:not(:disabled) { background-color: var(--error); color: white; }
        button.btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .main-content { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: var(--app-border); border-radius: 3px; }

        .section-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            color: var(--text-muted); letter-spacing: 0.5px; margin: 16px 0 10px;
        }
        .groups-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px; margin-bottom: 8px;
        }
        .group-card {
            background: var(--app-card); border: 1px solid var(--app-border); border-radius: 6px;
            padding: 14px 16px; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 12px; user-select: none;
        }
        .group-card:hover { background: #333333; border-color: var(--text-muted); }
        .group-card.active { border-color: var(--prometheus-orange); background: rgba(164, 129, 129, 0.1); }
        .group-icon {
            width: 38px; height: 38px; border-radius: 6px; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
            background: rgba(164, 129, 129, 0.15); color: var(--prometheus-orange);
        }
        .group-icon svg { width: 18px; height: 18px; }
        .group-info { min-width: 0; }
        .group-name { font-size: 13px; font-weight: 600; color: var(--text-white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .group-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .hosts-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
        }
        .host-card {
            background: var(--app-card); border: 1px solid var(--app-border); border-radius: 6px;
            padding: 14px 16px; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 12px; position: relative; user-select: none;
        }
        .host-card:hover { background: #333333; border-color: var(--text-muted); }
        .host-card.active-session { border-color: var(--success); }
        .host-avatar {
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
            font-size: 16px; font-weight: 700; color: #fff;
        }
        .host-avatar.docker { background: #2496ed; }
        .host-avatar.linux { background: #f0c040; color: #333; }
        .host-avatar.server { background: var(--success); }
        .host-info { min-width: 0; flex: 1; }
        .host-name { font-size: 13px; font-weight: 600; color: var(--text-white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .host-detail { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .host-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
        .host-tag {
            display: inline-block; padding: 1px 6px; border-radius: 4px;
            font-size: 9px; background: rgba(164, 129, 129, 0.12); color: var(--prometheus-orange);
            border: 1px solid rgba(164, 129, 129, 0.25);
        }
        .host-actions {
            display: none; position: absolute; top: 8px; right: 8px; gap: 2px;
        }
        .host-card:hover .host-actions { display: flex; }
        .host-actions button {
            background: var(--app-card-dark); border: 1px solid var(--app-border); color: var(--text-muted);
            cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center;
        }
        .host-actions button:hover { color: var(--text-white); border-color: var(--text-muted); }
        .host-actions button.delete-btn:hover { color: var(--error); border-color: var(--error); }

        .home-view { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .home-view.hidden { display: none; }
        .terminal-view { display: none; flex-direction: column; flex: 1; min-height: 0; }
        .terminal-view.active { display: flex; }

        .tab-bar {
            display: none; align-items: center; background: var(--app-topbar);
            border-bottom: 1px solid var(--app-border); padding: 0 4px; height: 34px;
            flex-shrink: 0; overflow-x: auto;
        }
        .tab-bar.visible { display: flex; }
        .tab-bar::-webkit-scrollbar { height: 0; }
        .tab-home {
            padding: 5px 12px; font-size: 11px; cursor: pointer; display: flex;
            align-items: center; gap: 5px; color: var(--text-muted); border-right: 1px solid var(--app-border);
            transition: all 0.15s; white-space: nowrap; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .tab-home:hover { color: var(--prometheus-orange); background: #333333; }
        .tab-home.active-view { color: var(--prometheus-orange); border-bottom: 2px solid var(--prometheus-orange); }
        .tab-home svg { width: 14px; height: 14px; }
        .tab {
            padding: 5px 12px; font-size: 11px; cursor: pointer; white-space: nowrap;
            border-right: 1px solid var(--app-border); display: flex; align-items: center;
            gap: 6px; color: var(--text-muted); transition: all 0.15s; position: relative;
            max-width: 180px;
        }
        .tab:hover { color: var(--text-white); background: #333333; }
        .tab.active { color: var(--text-white); background: var(--background); border-bottom: 2px solid var(--prometheus-orange); }
        .tab-close {
            font-size: 14px; line-height: 1; opacity: 0; transition: opacity 0.15s;
            cursor: pointer; color: var(--text-muted); padding: 0 2px;
        }
        .tab:hover .tab-close, .tab.active .tab-close { opacity: 0.6; }
        .tab-close:hover { opacity: 1 !important; color: var(--error); }
        .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .tab-dot.connected { background: var(--success); }
        .tab-dot.error { background: var(--error); }
        .tab-dot.connecting { background: var(--warning); }

        .terminal-wrapper { flex: 1; position: relative; overflow: hidden; }
        .terminal-container {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: none; padding: 4px;
        }
        .terminal-container.active { display: block; }
        .terminal-status {
            position: absolute; top: 8px; right: 12px; font-size: 10px;
            padding: 2px 8px; border-radius: 4px; z-index: 10;
            background: rgba(30,30,30,0.9);
        }
        .terminal-status.connected { color: var(--success); }
        .terminal-status.connecting { color: var(--warning); }
        .terminal-status.error { color: var(--error); }

        .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
        .empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 12px; }
        .empty-state h3 { font-size: 14px; font-weight: 500; color: var(--text-white); margin-bottom: 4px; }
        .empty-state p { font-size: 12px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: flex; align-items: center;
            justify-content: center; z-index: 1000; opacity: 0;
            pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-dialog {
            background: var(--app-card); border: 1px solid var(--app-border);
            border-radius: 8px; width: 460px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header {
            padding: 14px 18px; border-bottom: 1px solid var(--app-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: 14px; font-weight: 600; }
        .modal-close {
            background: none; border: none; color: var(--text-muted); font-size: 20px;
            cursor: pointer; line-height: 1;
        }
        .modal-close:hover { color: var(--text-white); }
        .modal-body { padding: 18px; }
        .modal-footer {
            padding: 12px 18px; border-top: 1px solid var(--app-border);
            display: flex; justify-content: flex-end; gap: 8px; align-items: center;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block; font-size: 11px; font-weight: 500; color: var(--text-muted);
            margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: var(--app-card-dark); border: 1px solid var(--app-border);
            color: var(--text-white); padding: 8px 12px; border-radius: 4px;
            font-size: 12px; outline: none; transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--prometheus-orange); }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }

        .context-menu {
            position: fixed; background: var(--app-card); border: 1px solid var(--app-border);
            border-radius: 6px; padding: 4px; z-index: 999; min-width: 160px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3); display: none;
        }
        .context-menu.show { display: block; }
        .context-menu-item {
            padding: 7px 12px; font-size: 12px; cursor: pointer; border-radius: 4px;
            display: flex; align-items: center; gap: 8px; color: var(--foreground);
        }
        .context-menu-item:hover { background: #333333; }
        .context-menu-item.danger { color: var(--error); }
        .context-menu-item svg { width: 14px; height: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                Remote Host
            </h1>
        </div>
        <div class="header-right">
            <a href="/" class="back-link">Back to Portal</a>
        </div>
    </div>

    <div class="home-view" id="home-view">
        <div class="search-bar">
            <input type="text" placeholder="Find a host or ssh user@hostname..." id="search-input">
        </div>
        <div class="toolbar">
            <button class="btn btn-primary" id="btn-new-host">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New host
            </button>
        </div>
        <div class="main-content" id="main-content"></div>
    </div>

    <div class="tab-bar" id="tab-bar"></div>

    <div class="terminal-view" id="terminal-view">
        <div class="terminal-wrapper" id="terminal-wrapper"></div>
    </div>

    <div id="modal-server" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-header">
                <h3 id="modal-title">Add Server</h3>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="srv-id">
                <div class="form-group">
                    <label>Server Name</label>
                    <input type="text" id="srv-name" placeholder="My Production Server">
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:2;">
                        <label>Host / IP</label>
                        <input type="text" id="srv-host" placeholder="192.168.1.100">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Port</label>
                        <input type="number" id="srv-port" value="22">
                    </div>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="srv-username" placeholder="root">
                </div>
                <div class="form-group">
                    <label>Auth Type</label>
                    <select id="srv-auth">
                        <option value="password">Password</option>
                        <option value="key">Private Key</option>
                    </select>
                </div>
                <div class="form-group" id="srv-password-group">
                    <label>Password</label>
                    <input type="password" id="srv-password" placeholder="Enter password">
                </div>
                <div class="form-group" id="srv-key-group" style="display:none;">
                    <label>Private Key</label>
                    <textarea id="srv-key" rows="4" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Group</label>
                        <input type="text" id="srv-group" placeholder="Default" list="group-suggestions">
                        <datalist id="group-suggestions"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Tags (comma separated)</label>
                        <input type="text" id="srv-tags" placeholder="production, web">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <div style="flex:1; display:flex; align-items:center;">
                    <button class="btn btn-secondary btn-sm" id="test-conn-btn">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        Test Connection
                    </button>
                    <span id="test-conn-result" style="font-size:11px; margin-left:8px;"></span>
                </div>
                <button class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="modal-save-btn">Save</button>
            </div>
        </div>
    </div>

    <div class="context-menu" id="context-menu">
        <div class="context-menu-item" data-action="connect">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            Connect
        </div>
        <div class="context-menu-item" data-action="edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Edit
        </div>
        <div class="context-menu-item danger" data-action="delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Delete
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script>
        let servers = [];
        let tabs = [];
        let activeTabId = null;
        let activeGroupFilter = null;
        let ctxServerId = null;
        const sessionToken = localStorage.getItem('hephaestus_session_token');
        if (!sessionToken) window.location.href = '/';

        // ---- Helpers ----
        function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

        function getAvatarClass(s) {
            const n = (s.name || '').toLowerCase();
            if (n.includes('docker')) return 'docker';
            if (s.username === 'root') return 'linux';
            return 'server';
        }
        function getInitials(name) {
            if (!name) return '?';
            const p = name.split(/[\s_\-]+/);
            return p.length >= 2 ? (p[0][0] + p[1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
        }

        // ---- API ----
        async function api(method, url, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionToken } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            return res.json();
        }
        async function loadServers() {
            const data = await api('GET', '/api/v1/remote-host/configs');
            if (data.success) servers = data.data || [];
        }

        // ---- Render Home ----
        function renderHome() {
            const container = document.getElementById('main-content');
            const search = (document.getElementById('search-input').value || '').toLowerCase();
            let filtered = servers;
            if (search) {
                filtered = servers.filter(s =>
                    s.name.toLowerCase().includes(search) || s.host.toLowerCase().includes(search) ||
                    s.username.toLowerCase().includes(search) || (s.groupName || '').toLowerCase().includes(search) ||
                    (s.tags || []).some(t => t.toLowerCase().includes(search))
                );
            }
            const groups = {};
            filtered.forEach(s => { const g = s.groupName || 'Default'; (groups[g] = groups[g] || []).push(s); });
            const groupNames = Object.keys(groups).sort();
            let html = '';

            if (groupNames.length > 0) {
                html += '<div class="section-label">Groups</div><div class="groups-grid">';
                groupNames.forEach(g => {
                    const isActive = activeGroupFilter === g;
                    html += `<div class="group-card${isActive ? ' active' : ''}" data-group="${esc(g)}">
                        <div class="group-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg></div>
                        <div class="group-info"><div class="group-name">${esc(g)}</div><div class="group-count">${groups[g].length} Host${groups[g].length > 1 ? 's' : ''}</div></div>
                    </div>`;
                });
                html += '</div>';
            }

            const hostsToShow = activeGroupFilter ? (groups[activeGroupFilter] || []) : filtered;
            const hostsLabel = activeGroupFilter ? 'Hosts \u2014 ' + activeGroupFilter : 'Hosts';
            if (hostsToShow.length > 0) {
                html += `<div class="section-label">${esc(hostsLabel)} <span style="font-weight:400;text-transform:none;">(${hostsToShow.length})</span></div><div class="hosts-grid">`;
                hostsToShow.forEach(s => {
                    const hasSession = tabs.some(t => t.serverId === s.id);
                    const tags = (s.tags || []);
                    html += `<div class="host-card${hasSession ? ' active-session' : ''}" data-id="${esc(s.id)}">
                        <div class="host-avatar ${getAvatarClass(s)}">${getInitials(s.name)}</div>
                        <div class="host-info">
                            <div class="host-name">${esc(s.name)}</div>
                            <div class="host-detail">ssh, ${esc(s.username)}, ${esc(s.host)}:${s.port}</div>
                            ${tags.length > 0 ? '<div class="host-tags">' + tags.map(t => '<span class="host-tag">' + esc(t) + '</span>').join('') + '</div>' : ''}
                        </div>
                        <div class="host-actions">
                            <button class="edit-btn" title="Edit"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
                            <button class="delete-btn" title="Delete"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                        </div>
                    </div>`;
                });
                html += '</div>';
            }
            if (!html) html = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg><h3>${search ? 'No hosts found' : 'No hosts yet'}</h3><p>${search ? 'Try a different search term' : 'Click "New host" to add a server'}</p></div>`;
            container.innerHTML = html;
            const dl = document.getElementById('group-suggestions');
            if (dl) dl.innerHTML = [...new Set(servers.map(s => s.groupName || 'Default'))].map(g => '<option value="' + esc(g) + '">').join('');
        }

        // ---- Event Delegation ----
        document.getElementById('main-content').addEventListener('click', (e) => {
            const groupCard = e.target.closest('.group-card');
            if (groupCard) {
                const g = groupCard.dataset.group;
                if (g) { activeGroupFilter = activeGroupFilter === g ? null : g; renderHome(); }
                return;
            }
            const hostCard = e.target.closest('.host-card');
            if (hostCard) {
                if (e.target.closest('.edit-btn')) { editServer(hostCard.dataset.id); return; }
                if (e.target.closest('.delete-btn')) { const s = servers.find(x => x.id === hostCard.dataset.id); if (s) deleteServer(s.id, s.name); return; }
                connectToServer(hostCard.dataset.id);
                return;
            }
        });
        document.getElementById('main-content').addEventListener('dblclick', (e) => {
            const groupCard = e.target.closest('.group-card');
            if (groupCard) {
                const g = groupCard.dataset.group;
                if (g) { activeGroupFilter = g; renderHome(); const hosts = servers.filter(s => (s.groupName || 'Default') === g); if (hosts.length) connectToServer(hosts[0].id); }
            }
        });

        document.getElementById('search-input').addEventListener('input', renderHome);
        document.getElementById('btn-new-host').addEventListener('click', showAddModal);

        // ---- Terminal View ----
        function showTerminalView() { document.getElementById('home-view').classList.add('hidden'); document.getElementById('terminal-view').classList.add('active'); }
        function showHomeView() { document.getElementById('home-view').classList.remove('hidden'); document.getElementById('terminal-view').classList.remove('active'); renderHome(); renderTabs(); }

        function connectToServer(serverId) {
            const existing = tabs.find(t => t.serverId === serverId);
            if (existing) { switchTab(existing.id); return; }
            const srv = servers.find(s => s.id === serverId);
            if (!srv) return;
            const tabId = 'tab-' + Date.now();
            const tab = { id: tabId, serverId, serverName: srv.name, ws: null, term: null, fitAddon: null, status: 'connecting' };
            tabs.push(tab);
            createTerminalContainer(tab);
            showTerminalView();
            renderTabs();
            switchTab(tabId);
            startSSH(tab, srv);
        }

        function createTerminalContainer(tab) {
            const wrapper = document.getElementById('terminal-wrapper');
            const div = document.createElement('div');
            div.className = 'terminal-container';
            div.id = 'term-' + tab.id;
            div.innerHTML = '<div class="terminal-status connecting" id="status-' + tab.id + '">Connecting...</div>';
            wrapper.appendChild(div);
        }

        function startSSH(tab, srv) {
            const statusEl = document.getElementById('status-' + tab.id);
            const container = document.getElementById('term-' + tab.id);

            const createTerminal = () => {
                tab.term = new Terminal({
                    cursorBlink: true,
                    fontSize: 14,
                    fontFamily: '"JetBrains Mono", "Cascadia Code", "Fira Code", "SF Mono", "Menlo", "Consolas", "Liberation Mono", monospace',
                    fontWeight: '400',
                    letterSpacing: 0,
                    lineHeight: 1.2,
                    allowProposedApi: true,
                    theme: {
                        background: '#1a1a1a',
                        foreground: '#e0e0e0',
                        cursor: '#1971c2',
                        cursorAccent: '#1a1a1a',
                        selectionBackground: '#264f78',
                        black: '#1a1a1a',
                        red: '#ef4444',
                        green: '#10b981',
                        yellow: '#f59e0b',
                        blue: '#3b82f6',
                        magenta: '#a855f7',
                        cyan: '#06b6d4',
                        white: '#e0e0e0',
                        brightBlack: '#6b7280',
                        brightRed: '#f87171',
                        brightGreen: '#34d399',
                        brightYellow: '#fbbf24',
                        brightBlue: '#60a5fa',
                        brightMagenta: '#c084fc',
                        brightCyan: '#22d3ee',
                        brightWhite: '#f9fafb'
                    },
                    convertEol: true,
                    scrollback: 10000
                });
                tab.fitAddon = new FitAddon.FitAddon();
                tab.term.loadAddon(tab.fitAddon);
                tab.term.open(container);
                tab.fitAddon.fit();
                connectSSH(tab, srv);
            };

            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(createTerminal);
            } else {
                createTerminal();
            }
        }

        function connectSSH(tab, srv) {
            const statusEl = document.getElementById('status-' + tab.id);
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = protocol + '//' + location.host + '/ws/remote-host?token=' + encodeURIComponent(sessionToken) + '&hostId=' + encodeURIComponent(srv.id) + '&cols=' + tab.term.cols + '&rows=' + tab.term.rows;
            tab.ws = new WebSocket(url);
            tab.ws.onmessage = (ev) => {
                try {
                    const msg = JSON.parse(ev.data);
                    if (msg.type === 'data') { tab.term.write(msg.data); }
                    else if (msg.type === 'connected') { tab.status = 'connected'; statusEl.textContent = msg.username + '@' + msg.host; statusEl.className = 'terminal-status connected'; tab.term.focus(); renderTabs(); }
                    else if (msg.type === 'disconnected') { tab.status = 'disconnected'; statusEl.textContent = 'Disconnected'; statusEl.className = 'terminal-status error'; tab.ws = null; renderTabs(); }
                    else if (msg.type === 'error') { tab.status = 'error'; statusEl.textContent = msg.message; statusEl.className = 'terminal-status error'; tab.ws = null; renderTabs(); }
                } catch(_) {}
            };
            tab.ws.onclose = () => { tab.status = 'disconnected'; statusEl.textContent = 'Connection closed'; statusEl.className = 'terminal-status error'; tab.ws = null; renderTabs(); };
            tab.ws.onerror = () => { tab.status = 'error'; statusEl.textContent = 'Connection error'; statusEl.className = 'terminal-status error'; };
            tab.term.onData((data) => { if (tab.ws && tab.ws.readyState === WebSocket.OPEN) tab.ws.send(JSON.stringify({ type: 'input', data })); });
            tab.term.onResize(({ cols, rows }) => { if (tab.ws && tab.ws.readyState === WebSocket.OPEN) tab.ws.send(JSON.stringify({ type: 'resize', cols, rows })); });
        }

        function switchTab(tabId) {
            activeTabId = tabId;
            showTerminalView();
            tabs.forEach(t => { const el = document.getElementById('term-' + t.id); if (el) el.classList.toggle('active', t.id === tabId); });
            const at = tabs.find(t => t.id === tabId);
            if (at && at.fitAddon) { setTimeout(() => at.fitAddon.fit(), 50); if (at.term) at.term.focus(); }
            renderTabs();
        }

        function closeTab(tabId, ev) {
            if (ev) ev.stopPropagation();
            const idx = tabs.findIndex(t => t.id === tabId);
            if (idx === -1) return;
            const tab = tabs[idx];
            if (tab.ws) { try { tab.ws.send(JSON.stringify({ type: 'disconnect' })); } catch(_) {} tab.ws.close(); }
            if (tab.term) tab.term.dispose();
            const el = document.getElementById('term-' + tab.id);
            if (el) el.remove();
            tabs.splice(idx, 1);
            if (activeTabId === tabId) {
                if (tabs.length > 0) switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
                else showHomeView();
            }
            renderTabs();
        }

        function renderTabs() {
            const bar = document.getElementById('tab-bar');
            if (tabs.length === 0) { bar.classList.remove('visible'); return; }
            bar.classList.add('visible');
            const homeActive = !document.getElementById('home-view').classList.contains('hidden');
            let html = '<div class="tab-home' + (homeActive ? ' active-view' : '') + '" id="tab-home-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Servers</div>';
            tabs.forEach(t => {
                html += '<div class="tab' + (t.id === activeTabId ? ' active' : '') + '" data-tab="' + t.id + '"><span class="tab-dot ' + t.status + '"></span><span style="overflow:hidden;text-overflow:ellipsis;">' + esc(t.serverName) + '</span><span class="tab-close" data-close="' + t.id + '">&times;</span></div>';
            });
            bar.innerHTML = html;
        }

        document.getElementById('tab-bar').addEventListener('click', (e) => {
            const closeBtn = e.target.closest('.tab-close');
            if (closeBtn) { closeTab(closeBtn.dataset.close, e); return; }
            const homeBtn = e.target.closest('.tab-home');
            if (homeBtn) { showHomeView(); return; }
            const tab = e.target.closest('.tab');
            if (tab) switchTab(tab.dataset.tab);
        });

        // ---- Keyboard shortcuts ----
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!document.getElementById('home-view').classList.contains('hidden')) return;
                if (tabs.length > 0 && activeTabId) {
                    const tab = tabs.find(t => t.id === activeTabId);
                    if (tab && tab.term) tab.term.blur();
                }
                showHomeView();
            }
        });

        // ---- Modal ----
        function showAddModal() {
            document.getElementById('srv-id').value = '';
            document.getElementById('srv-name').value = '';
            document.getElementById('srv-host').value = '';
            document.getElementById('srv-port').value = '22';
            document.getElementById('srv-username').value = '';
            document.getElementById('srv-auth').value = 'password';
            document.getElementById('srv-password').value = '';
            document.getElementById('srv-password').placeholder = 'Enter password';
            document.getElementById('srv-key').value = '';
            document.getElementById('srv-group').value = 'Default';
            document.getElementById('srv-tags').value = '';
            document.getElementById('modal-title').textContent = 'Add Server';
            document.getElementById('test-conn-result').textContent = '';
            onAuthChange();
            document.getElementById('modal-server').classList.add('active');
        }

        function editServer(id) {
            const s = servers.find(x => x.id === id);
            if (!s) return;
            document.getElementById('srv-id').value = s.id;
            document.getElementById('srv-name').value = s.name;
            document.getElementById('srv-host').value = s.host;
            document.getElementById('srv-port').value = s.port;
            document.getElementById('srv-username').value = s.username;
            document.getElementById('srv-auth').value = s.authType;
            document.getElementById('srv-password').value = '';
            document.getElementById('srv-password').placeholder = 'Enter to change';
            document.getElementById('srv-key').value = '';
            document.getElementById('srv-group').value = s.groupName || 'Default';
            document.getElementById('srv-tags').value = (s.tags || []).join(', ');
            document.getElementById('modal-title').textContent = 'Edit Server';
            document.getElementById('test-conn-result').textContent = '';
            onAuthChange();
            document.getElementById('modal-server').classList.add('active');
        }

        function closeModal() { document.getElementById('modal-server').classList.remove('active'); }
        function onAuthChange() {
            const t = document.getElementById('srv-auth').value;
            document.getElementById('srv-password-group').style.display = t === 'password' ? 'block' : 'none';
            document.getElementById('srv-key-group').style.display = t === 'key' ? 'block' : 'none';
        }

        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
        document.getElementById('modal-save-btn').addEventListener('click', saveServer);
        document.getElementById('srv-auth').addEventListener('change', onAuthChange);

        async function saveServer() {
            const id = document.getElementById('srv-id').value;
            const body = {
                id: id || undefined,
                name: document.getElementById('srv-name').value.trim(),
                host: document.getElementById('srv-host').value.trim(),
                port: parseInt(document.getElementById('srv-port').value, 10) || 22,
                username: document.getElementById('srv-username').value.trim(),
                authType: document.getElementById('srv-auth').value,
                password: document.getElementById('srv-password').value,
                sshKey: document.getElementById('srv-key').value,
                groupName: document.getElementById('srv-group').value.trim() || 'Default',
                tags: document.getElementById('srv-tags').value.split(',').map(t => t.trim()).filter(Boolean),
            };
            if (!body.name || !body.host || !body.username) { alert('Fill in all required fields.'); return; }
            if (!id && body.authType === 'password' && !body.password) { alert('Password is required.'); return; }
            const data = await api('POST', '/api/v1/remote-host/configs', body);
            if (!data.success) { alert(data.error); return; }
            closeModal();
            await loadServers();
            renderHome();
        }

        async function deleteServer(id, name) {
            if (!confirm('Delete server "' + name + '"?')) return;
            await api('DELETE', '/api/v1/remote-host/configs/' + id);
            await loadServers();
            renderHome();
        }

        document.getElementById('test-conn-btn').addEventListener('click', async function() {
            const btn = this;
            const result = document.getElementById('test-conn-result');
            btn.disabled = true; btn.textContent = 'Testing...'; result.textContent = ''; result.style.color = '';
            const body = {
                host: document.getElementById('srv-host').value.trim(),
                port: document.getElementById('srv-port').value,
                username: document.getElementById('srv-username').value.trim(),
                authType: document.getElementById('srv-auth').value,
                password: document.getElementById('srv-password').value,
                sshKey: document.getElementById('srv-key').value,
            };
            if (!body.host || !body.username) {
                result.textContent = 'Host and username are required.'; result.style.color = 'var(--red)';
                btn.disabled = false; btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Test Connection';
                return;
            }
            try {
                const data = await api('POST', '/api/v1/remote-host/test-connection', body);
                result.textContent = data.message; result.style.color = data.success ? 'var(--green)' : 'var(--red)';
            } catch (e) { result.textContent = 'Request failed.'; result.style.color = 'var(--red)'; }
            btn.disabled = false; btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Test Connection';
        });

        // ---- Context Menu ----
        function showContextMenu(ev, serverId) {
            ev.preventDefault(); ev.stopPropagation();
            ctxServerId = serverId;
            const menu = document.getElementById('context-menu');
            menu.style.left = ev.clientX + 'px'; menu.style.top = ev.clientY + 'px';
            menu.classList.add('show');
        }
        function hideContextMenu() { document.getElementById('context-menu').classList.remove('show'); ctxServerId = null; }
        document.addEventListener('click', hideContextMenu);
        document.getElementById('context-menu').addEventListener('click', (e) => {
            const item = e.target.closest('.context-menu-item');
            if (!item || !ctxServerId) return;
            const action = item.dataset.action;
            if (action === 'connect') connectToServer(ctxServerId);
            else if (action === 'edit') editServer(ctxServerId);
            else if (action === 'delete') { const s = servers.find(x => x.id === ctxServerId); if (s) deleteServer(s.id, s.name); }
            hideContextMenu();
        });
        document.getElementById('main-content').addEventListener('contextmenu', (e) => {
            const hostCard = e.target.closest('.host-card');
            if (hostCard) showContextMenu(e, hostCard.dataset.id);
        });

        // ---- Keyboard ----
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); hideContextMenu(); } });
        window.addEventListener('resize', () => { tabs.forEach(t => { if (t.fitAddon) t.fitAddon.fit(); }); });

        // ---- Init ----
        async function init() {
            await loadServers();
            renderHome();
        }
        init();
    </script>
</body>
</html>
