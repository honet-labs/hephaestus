<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Host - Hephaestus</title>
    <link rel="stylesheet" href="/vendor/xterm/xterm.min.css">
    <style>
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('/vendor/fonts/JetBrainsMono-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('/vendor/fonts/JetBrainsMono-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        :root {
            color-scheme: dark;
            --background: #242424;
            --foreground: #cbd5e1;
            --app-sidebar: rgb(65, 73, 81);
            --app-topbar: #1e1e1e;
            --app-card: #2e2e2e;
            --app-card-dark: #1f1f1f;
            --app-border: #3c3c3c;
            --text-white: #ffffff;
            --text-muted: #a0a0a0;
            --btn-primary-bg: #1971c2;
            --btn-primary-color: #ffffff;
            --btn-primary-hover: #1864ab;
            --prometheus-orange: #a48181;
            --success: #10b981;
            --success-border: rgba(16, 185, 129, 0.3);
            --error: #ef4444;
            --error-border: rgba(239, 68, 68, 0.3);
            --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, button, input, select, textarea, span, p, a, label {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            font-size: 13px;
        }
        body {
            background-color: var(--background);
            color: var(--foreground);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        h1, h2, h3, h4 { font-weight: 600; color: var(--text-white); }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; background: var(--app-topbar); border-bottom: 1px solid var(--app-border);
            flex-shrink: 0; height: 42px;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header h1 { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header h1 svg { width: 16px; height: 16px; color: var(--prometheus-orange); }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .back-link {
            color: var(--text-muted); text-decoration: none; font-size: 11px;
            padding: 4px 10px; border: 1px solid var(--app-border); border-radius: 4px;
            transition: all 0.2s;
        }
        .back-link:hover { color: var(--text-white); border-color: var(--text-muted); }

        .search-bar { padding: 12px 20px; flex-shrink: 0; }
        .search-bar input {
            width: 100%; background: var(--app-card-dark); border: 1px solid var(--app-border);
            color: var(--text-white); padding: 8px 12px; border-radius: 4px;
            font-size: 13px; outline: none; transition: border-color 0.2s;
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-bar input:focus { border-color: var(--prometheus-orange); }

        .toolbar {
            display: flex; align-items: center; padding: 0 20px; gap: 12px;
            flex-shrink: 0; margin-bottom: 8px;
        }
        button.btn {
            border-radius: 4px; padding: 8px 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
            font-size: 11px; letter-spacing: 0.5px; display: inline-flex;
            align-items: center; gap: 6px; border: 1px solid transparent;
        }
        button.btn-primary { background-color: var(--btn-primary-bg); color: var(--btn-primary-color); }
        button.btn-primary:hover:not(:disabled) { background-color: var(--btn-primary-hover); }
        button.btn-secondary { background-color: var(--app-card-dark); border: 1px solid var(--app-border); color: var(--foreground); }
        button.btn-secondary:hover:not(:disabled) { color: white; background-color: #333333; border-color: var(--prometheus-orange); }
        button.btn-danger { background-color: rgba(248, 81, 73, 0.12); border: 1px solid var(--error-border); color: #ff7b72; }
        button.btn-danger:hover:not(:disabled) { background-color: var(--error); color: white; }
        button.btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .main-content { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: var(--app-border); border-radius: 3px; }

        .section-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            color: var(--text-muted); letter-spacing: 0.5px; margin: 16px 0 10px;
        }
        .groups-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px; margin-bottom: 8px;
        }
        .group-card {
            background: var(--app-card); border: 1px solid var(--app-border); border-radius: 6px;
            padding: 14px 16px; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 12px; user-select: none;
        }
        .group-card:hover { background: #333333; border-color: var(--text-muted); }
        .group-card.active { border-color: var(--prometheus-orange); background: rgba(164, 129, 129, 0.1); }
        .group-icon {
            width: 38px; height: 38px; border-radius: 6px; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
            background: rgba(164, 129, 129, 0.15); color: var(--prometheus-orange);
        }
        .group-icon svg { width: 18px; height: 18px; }
        .group-info { min-width: 0; }
        .group-name { font-size: 13px; font-weight: 600; color: var(--text-white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .group-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .hosts-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
        }
        .host-card {
            background: var(--app-card); border: 1px solid var(--app-border); border-radius: 6px;
            padding: 14px 16px; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 12px; position: relative; user-select: none;
        }
        .host-card:hover { background: #333333; border-color: var(--text-muted); }
        .host-card.active-session { border-color: var(--success); }
        .host-avatar {
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
            font-size: 16px; font-weight: 700; color: #fff;
        }
        .host-avatar.docker { background: #2496ed; }
        .host-avatar.linux { background: #f0c040; color: #333; }
        .host-avatar.server { background: var(--success); }
        .host-info { min-width: 0; flex: 1; }
        .host-name { font-size: 13px; font-weight: 600; color: var(--text-white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .host-detail { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .host-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
        .host-tag {
            display: inline-block; padding: 1px 6px; border-radius: 4px;
            font-size: 9px; background: rgba(164, 129, 129, 0.12); color: var(--prometheus-orange);
            border: 1px solid rgba(164, 129, 129, 0.25);
        }
        .host-actions {
            display: none; position: absolute; top: 8px; right: 8px; gap: 2px;
        }
        .host-card:hover .host-actions { display: flex; }
        .host-actions button {
            background: var(--app-card-dark); border: 1px solid var(--app-border); color: var(--text-muted);
            cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center;
        }
        .host-actions button:hover { color: var(--text-white); border-color: var(--text-muted); }
        .host-actions button.delete-btn:hover { color: var(--error); border-color: var(--error); }

        .tab-bar {
            display: none; align-items: center; background: #2a2a2a;
            border-bottom: 1px solid var(--app-border); padding: 0 4px; height: 34px;
            flex-shrink: 0; overflow-x: auto;
        }
        .tab-bar.visible { display: flex; }
        .tab-bar::-webkit-scrollbar { height: 0; }
        .tab-home {
            padding: 5px 12px; font-size: 11px; cursor: pointer; display: flex;
            align-items: center; gap: 5px; color: var(--text-muted); border-right: 1px solid var(--app-border);
            transition: all 0.15s; white-space: nowrap; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .tab-home:hover { color: var(--prometheus-orange); background: #333333; }
        .tab-home.active-view { color: var(--prometheus-orange); border-bottom: 2px solid var(--prometheus-orange); }
        .tab-home svg { width: 14px; height: 14px; }
        .tab-add {
            padding: 5px 10px; font-size: 16px; cursor: pointer; display: flex;
            align-items: center; color: var(--text-muted); border-right: 1px solid var(--app-border);
            transition: all 0.15s; font-weight: 600; line-height: 1;
        }
        .tab-add:hover { color: var(--prometheus-orange); background: #333333; }
        .tab {
            padding: 5px 12px; font-size: 11px; cursor: pointer; white-space: nowrap;
            border-right: 1px solid var(--app-border); display: flex; align-items: center;
            gap: 6px; color: var(--text-muted); transition: all 0.15s; position: relative;
            max-width: 180px;
        }
        .tab:hover { color: var(--text-white); background: #333333; }
        .tab.active { color: var(--text-white); background: var(--background); border-bottom: 2px solid var(--prometheus-orange); }
        .tab-close {
            font-size: 14px; line-height: 1; opacity: 0; transition: opacity 0.15s;
            cursor: pointer; color: var(--text-muted); padding: 0 2px;
        }
        .tab:hover .tab-close, .tab.active .tab-close { opacity: 0.6; }
        .tab-close:hover { opacity: 1 !important; color: var(--error); }
        .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .tab-dot.connected { background: var(--success); }
        .tab-dot.error { background: var(--error); }
        .tab-dot.connecting { background: var(--warning); }
        .tab-group-sep {
            padding: 5px 10px; font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--text-muted); border-right: 1px solid var(--app-border);
            display: flex; align-items: center; gap: 4px; white-space: nowrap; opacity: 0.6;
            cursor: default; user-select: none;
        }
        .tab-group-sep .tab-group-count {
            background: var(--app-card-dark); border-radius: 3px; padding: 0 4px;
            font-size: 8px; font-weight: 600; color: var(--prometheus-orange);
        }
        .tab-rename-input {
            background: var(--app-card-dark); border: 1px solid var(--prometheus-orange);
            color: var(--text-white); font-size: 11px; padding: 1px 4px; border-radius: 3px;
            outline: none; width: 120px; max-width: 140px;
        }
        .tab-transfer {
            padding: 5px 10px; font-size: 11px; cursor: pointer; display: flex;
            align-items: center; gap: 5px; color: var(--text-muted); border-right: 1px solid var(--app-border);
            transition: all 0.15s; white-space: nowrap; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .tab-transfer:hover { color: var(--prometheus-orange); background: #333333; }
        .tab-transfer svg { width: 14px; height: 14px; }
        .upload-dropzone {
            border: 2px dashed var(--app-border); border-radius: 8px; padding: 40px 20px;
            text-align: center; cursor: pointer; transition: all 0.2s; background: var(--app-card-dark);
        }
        .upload-dropzone:hover, .upload-dropzone.dragover {
            border-color: var(--prometheus-orange); background: rgba(164, 129, 129, 0.08);
        }
        .upload-dropzone svg { width: 32px; height: 32px; color: var(--text-muted); margin-bottom: 8px; }
        .upload-dropzone p { color: var(--text-muted); font-size: 12px; margin: 0; }
        .upload-dropzone .upload-file-name { color: var(--text-white); font-weight: 600; font-size: 13px; margin-top: 8px; }
        .upload-file-list { margin-top: 10px; max-height: 150px; overflow-y: auto; }
        .upload-file-item {
            display: flex; align-items: center; gap: 8px; padding: 6px 10px;
            background: var(--app-card-dark); border: 1px solid var(--app-border); border-radius: 4px;
            margin-bottom: 4px; font-size: 12px;
        }
        .upload-file-item .file-name { flex: 1; color: var(--text-white); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .upload-file-item .file-size { color: var(--text-muted); white-space: nowrap; }
        .upload-file-item .file-remove { cursor: pointer; color: var(--text-muted); padding: 2px; }
        .upload-file-item .file-remove:hover { color: var(--error); }
        .upload-progress { margin-top: 10px; }
        .upload-progress-bar {
            width: 100%; height: 6px; background: var(--app-card-dark); border-radius: 3px; overflow: hidden;
        }
        .upload-progress-fill {
            height: 100%; background: var(--prometheus-orange); border-radius: 3px; transition: width 0.3s;
        }
        .upload-progress-text { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .upload-result { margin-top: 8px; font-size: 12px; padding: 6px 10px; border-radius: 4px; }
        .upload-result.success { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid var(--success-border); }
        .upload-result.error { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid var(--error-border); }

        .content-area { flex: 1; position: relative; overflow: hidden; min-height: 0; }
        .home-view {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .home-view.hidden { display: none; }
        .terminal-view {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: none; flex-direction: column;
        }
        .terminal-view.active { display: flex; }

        .terminal-wrapper { flex: 1; position: relative; overflow: hidden; }
        .terminal-container {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: none;
        }
        .terminal-container.active { display: block; }
        .terminal-status {
            position: absolute; top: 8px; right: 12px; font-size: 10px;
            padding: 2px 8px; border-radius: 4px; z-index: 10;
            background: rgba(30,30,30,0.9);
        }
        .terminal-status.connected { color: var(--success); }
        .terminal-status.connecting { color: var(--warning); }
        .terminal-status.error { color: var(--error); }

        .reconnect-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26,26,26,0.85); display: none;
            align-items: center; justify-content: center; flex-direction: column;
            z-index: 20; gap: 12px;
        }
        .reconnect-overlay.active { display: flex; }
        .reconnect-overlay svg { width: 36px; height: 36px; color: var(--text-muted); opacity: 0.5; }
        .reconnect-overlay .reconnect-msg { font-size: 13px; color: var(--text-muted); }
        .reconnect-overlay .reconnect-btn {
            padding: 8px 20px; border-radius: 4px; font-size: 12px; font-weight: 600;
            cursor: pointer; border: 1px solid var(--prometheus-orange);
            background: rgba(164,129,129,0.15); color: var(--prometheus-orange);
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .reconnect-overlay .reconnect-btn:hover { background: var(--prometheus-orange); color: #fff; }
        .reconnect-overlay .reconnect-btn svg { width: 14px; height: 14px; opacity: 1; }

        .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
        .empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 12px; }
        .empty-state h3 { font-size: 14px; font-weight: 500; color: var(--text-white); margin-bottom: 4px; }
        .empty-state p { font-size: 12px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: flex; align-items: center;
            justify-content: center; z-index: 1000; opacity: 0;
            pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-dialog {
            background: var(--app-card); border: 1px solid var(--app-border);
            border-radius: 8px; width: 460px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header {
            padding: 14px 18px; border-bottom: 1px solid var(--app-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: 14px; font-weight: 600; }
        .modal-close {
            background: none; border: none; color: var(--text-muted); font-size: 20px;
            cursor: pointer; line-height: 1;
        }
        .modal-close:hover { color: var(--text-white); }
        .modal-body { padding: 18px; }
        .modal-footer {
            padding: 12px 18px; border-top: 1px solid var(--app-border);
            display: flex; justify-content: flex-end; gap: 8px; align-items: center;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block; font-size: 11px; font-weight: 500; color: var(--text-muted);
            margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: var(--app-card-dark); border: 1px solid var(--app-border);
            color: var(--text-white); padding: 8px 12px; border-radius: 4px;
            font-size: 12px; outline: none; transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--prometheus-orange); }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }

        .context-menu {
            position: fixed; background: var(--app-card); border: 1px solid var(--app-border);
            border-radius: 6px; padding: 4px; z-index: 999; min-width: 160px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3); display: none;
        }
        .context-menu.show { display: block; }
        .context-menu-item {
            padding: 7px 12px; font-size: 12px; cursor: pointer; border-radius: 4px;
            display: flex; align-items: center; gap: 8px; color: var(--foreground);
        }
        .context-menu-item:hover { background: #333333; }
        .context-menu-item.danger { color: var(--error); }
        .context-menu-item svg { width: 14px; height: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                Remote Host
            </h1>
        </div>
        <div class="header-right">
            <a href="/" class="back-link">Back to Portal</a>
        </div>
    </div>

    <div class="tab-bar" id="tab-bar"></div>

    <div class="content-area">
        <div class="home-view" id="home-view">
            <div class="search-bar">
                <input type="text" placeholder="Find a host or ssh user@hostname..." id="search-input">
            </div>
            <div class="toolbar">
                <button class="btn btn-primary" id="btn-new-host">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New host
                </button>
            </div>
            <div class="main-content" id="main-content"></div>
        </div>

        <div class="terminal-view" id="terminal-view">
            <div class="terminal-wrapper" id="terminal-wrapper"></div>
        </div>
    </div>

    <div id="modal-server" class="modal-overlay">
        <div class="modal-dialog">
            <div class="modal-header">
                <h3 id="modal-title">Add Server</h3>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="srv-id">
                <div class="form-group">
                    <label>Server Name</label>
                    <input type="text" id="srv-name" placeholder="My Production Server">
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:2;">
                        <label>Host / IP</label>
                        <input type="text" id="srv-host" placeholder="192.168.1.100">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Port</label>
                        <input type="number" id="srv-port" value="22">
                    </div>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="srv-username" placeholder="root">
                </div>
                <div class="form-group">
                    <label>Auth Type</label>
                    <select id="srv-auth">
                        <option value="password">Password</option>
                        <option value="key">Private Key</option>
                    </select>
                </div>
                <div class="form-group" id="srv-password-group">
                    <label>Password</label>
                    <input type="password" id="srv-password" placeholder="Enter password">
                </div>
                <div class="form-group" id="srv-key-group" style="display:none;">
                    <label>Private Key</label>
                    <textarea id="srv-key" rows="4" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Group</label>
                        <input type="text" id="srv-group" placeholder="Default" list="group-suggestions">
                        <datalist id="group-suggestions"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Tags (comma separated)</label>
                        <input type="text" id="srv-tags" placeholder="production, web">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <div style="flex:1; display:flex; align-items:center;">
                    <button class="btn btn-secondary btn-sm" id="test-conn-btn">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        Test Connection
                    </button>
                    <span id="test-conn-result" style="font-size:11px; margin-left:8px;"></span>
                </div>
                <button class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="modal-save-btn">Save</button>
            </div>
        </div>
    </div>

            Duplicate Tab

    <script src="/vendor/xterm/xterm.min.js"></script>
    <script src="/vendor/xterm/addon-fit.min.js"></script>
    <script>
    (function() {
        var servers = [];
        var tabs = [];
        var activeTabId = null;
        var activeGroupFilter = null;
        var ctxServerId = null;
        var sessionToken = localStorage.getItem('hephaestus_session_token');
        var STORAGE_KEY = 'remote_host_tabs';
        var TAB_RENAME_KEY = 'remote_host_tab_names';
        if (!sessionToken) { window.location.href = '/'; return; }

        var TERMINAL_FONT = '"JetBrains Mono", Consolas, "Courier New", monospace';
        var ctxTabId = null;

        function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

        function getTabDisplayNames() {
            try { return JSON.parse(localStorage.getItem(TAB_RENAME_KEY)) || {}; } catch(_) { return {}; }
        }
        function setTabDisplayName(tabId, name) {
            var names = getTabDisplayNames();
            if (name) { names[tabId] = name; } else { delete names[tabId]; }
            try { localStorage.setItem(TAB_RENAME_KEY, JSON.stringify(names)); } catch(_) {}
        }

        function saveTabs() {
            var data = tabs.map(function(t) { return { serverId: t.serverId, serverName: t.serverName, displayName: t.displayName || '', groupName: t.groupName || 'Default' }; });
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(_){}
        }
        function restoreTabs() {
            var raw;
            try { raw = localStorage.getItem(STORAGE_KEY); } catch(_){ return; }
            if (!raw) return;
            var saved;
            try { saved = JSON.parse(raw); } catch(_){ return; }
            if (!saved || !saved.length) return;
            var displayNames = getTabDisplayNames();
            for (var i = 0; i < saved.length; i++) {
                var exists = false;
                for (var j = 0; j < servers.length; j++) { if (servers[j].id === saved[i].serverId) { exists = true; break; } }
                if (exists) connectToServer(saved[i].serverId, saved[i].displayName || displayNames[saved[i].serverId] || '');
            }
        }
        function getAvatarClass(s) {
            var n = (s.name || '').toLowerCase();
            if (n.indexOf('docker') !== -1) return 'docker';
            if (s.username === 'root') return 'linux';
            return 'server';
        }
        function getInitials(name) {
            if (!name) return '?';
            var p = name.split(/[\s_\-]+/);
            return p.length >= 2 ? (p[0][0] + p[1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
        }

        function api(method, url, body) {
            var opts = { method: method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionToken } };
            if (body) opts.body = JSON.stringify(body);
            return fetch(url, opts).then(function(r) { return r.json(); });
        }
        function loadServers() {
            return api('GET', '/api/v1/remote-host/configs').then(function(data) {
                if (data.success) servers = data.data || [];
            }).catch(function() { servers = []; });
        }

        function renderHome() {
            var container = document.getElementById('main-content');
            var search = (document.getElementById('search-input').value || '').toLowerCase();
            var filtered = servers;
            if (search) {
                filtered = servers.filter(function(s) {
                    return s.name.toLowerCase().indexOf(search) !== -1 || s.host.toLowerCase().indexOf(search) !== -1 ||
                        s.username.toLowerCase().indexOf(search) !== -1 || (s.groupName || '').toLowerCase().indexOf(search) !== -1 ||
                        (s.tags || []).some(function(t) { return t.toLowerCase().indexOf(search) !== -1; });
                });
            }
            var groups = {};
            filtered.forEach(function(s) { var g = s.groupName || 'Default'; if (!groups[g]) groups[g] = []; groups[g].push(s); });
            var groupNames = Object.keys(groups).sort();
            var html = '';

            if (groupNames.length > 0) {
                html += '<div class="section-label">Groups</div><div class="groups-grid">';
                groupNames.forEach(function(g) {
                    var isActive = activeGroupFilter === g;
                    html += '<div class="group-card' + (isActive ? ' active' : '') + '" data-group="' + esc(g) + '">' +
                        '<div class="group-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg></div>' +
                        '<div class="group-info"><div class="group-name">' + esc(g) + '</div><div class="group-count">' + groups[g].length + ' Host' + (groups[g].length > 1 ? 's' : '') + '</div></div></div>';
                });
                html += '</div>';
            }

            var hostsToShow = activeGroupFilter ? (groups[activeGroupFilter] || []) : filtered;
            var hostsLabel = activeGroupFilter ? 'Hosts \u2014 ' + activeGroupFilter : 'Hosts';
            if (hostsToShow.length > 0) {
                html += '<div class="section-label">' + esc(hostsLabel) + ' <span style="font-weight:400;text-transform:none;">(' + hostsToShow.length + ')</span></div><div class="hosts-grid">';
                hostsToShow.forEach(function(s) {
                    var hasSession = tabs.some(function(t) { return t.serverId === s.id; });
                    var tags = (s.tags || []);
                    html += '<div class="host-card' + (hasSession ? ' active-session' : '') + '" data-id="' + esc(s.id) + '">' +
                        '<div class="host-avatar ' + getAvatarClass(s) + '">' + getInitials(s.name) + '</div>' +
                        '<div class="host-info">' +
                            '<div class="host-name">' + esc(s.name) + '</div>' +
                            '<div class="host-detail">ssh, ' + esc(s.username) + ', ' + esc(s.host) + ':' + s.port + '</div>' +
                            (tags.length > 0 ? '<div class="host-tags">' + tags.map(function(t) { return '<span class="host-tag">' + esc(t) + '</span>'; }).join('') + '</div>' : '') +
                        '</div>' +
                        '<div class="host-actions">' +
                            '<button class="edit-btn" title="Edit"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>' +
                            '<button class="delete-btn" title="Delete"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>' +
                        '</div></div>';
                });
                html += '</div>';
            }
            if (!html) html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg><h3>' + (search ? 'No hosts found' : 'No hosts yet') + '</h3><p>' + (search ? 'Try a different search term' : 'Click "New host" to add a server') + '</p></div>';
            container.innerHTML = html;
            var dl = document.getElementById('group-suggestions');
            if (dl) dl.innerHTML = Array.from(new Set(servers.map(function(s) { return s.groupName || 'Default'; }))).map(function(g) { return '<option value="' + esc(g) + '">'; }).join('');
        }

        function isHomeVisible() { return !document.getElementById('home-view').classList.contains('hidden'); }

        function showTerminalView() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('terminal-view').classList.add('active');
        }
        function showHomeView() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('terminal-view').classList.remove('active');
            renderHome();
            renderTabs();
        }

        function connectToServer(serverId, displayName) {
            var srv = null;
            for (var i = 0; i < servers.length; i++) { if (servers[i].id === serverId) { srv = servers[i]; break; } }
            if (!srv) return;

            showTerminalView();

            var tabId = 'tab-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);
            var dn = displayName || '';
            var tab = { id: tabId, serverId: serverId, serverName: srv.name, displayName: dn, groupName: srv.groupName || 'Default', serverHost: srv.host, serverUsername: srv.username, ws: null, term: null, fitAddon: null, status: 'connecting', containerEl: null, statusEl: null };
            tabs.push(tab);
            createTerminalContainer(tab);
            renderTabs();
            switchTab(tabId);
            saveTabs();

            startSSH(tab, srv);
        }

        function createTerminalContainer(tab) {
            var wrapper = document.getElementById('terminal-wrapper');
            var div = document.createElement('div');
            div.className = 'terminal-container';
            div.id = 'term-' + tab.id;
            var statusDiv = document.createElement('div');
            statusDiv.className = 'terminal-status connecting';
            statusDiv.id = 'status-' + tab.id;
            statusDiv.textContent = 'Connecting...';
            div.appendChild(statusDiv);
            var overlay = document.createElement('div');
            overlay.className = 'reconnect-overlay';
            overlay.id = 'overlay-' + tab.id;
            overlay.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>' +
                '<div class="reconnect-msg">Connection lost</div>' +
                '<button class="reconnect-btn" data-reconnect="' + tab.id + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>' +
                'Reconnect</button>';
            div.appendChild(overlay);
            wrapper.appendChild(div);
            tab.containerEl = div;
            tab.statusEl = statusDiv;
            tab.overlayEl = overlay;
        }

        function startSSH(tab, srv) {
            var container = tab.containerEl;
            var statusEl = tab.statusEl;

            var ro = new ResizeObserver(function(entries) {
                for (var i = 0; i < entries.length; i++) {
                    var rect = entries[i].contentRect;
                    if (rect.width > 0 && rect.height > 0) {
                        ro.disconnect();
                        doCreateTerminal(tab, srv, container, statusEl);
                        return;
                    }
                }
            });
            ro.observe(container);
        }

        function doCreateTerminal(tab, srv, container, statusEl) {
            tab.term = new Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: TERMINAL_FONT,
                theme: {
                    background: '#1a1a1a',
                    foreground: '#e0e0e0',
                    cursor: '#1971c2',
                    cursorAccent: '#1a1a1a',
                    selectionBackground: '#264f78',
                    black: '#1a1a1a',
                    red: '#ef4444',
                    green: '#10b981',
                    yellow: '#f59e0b',
                    blue: '#3b82f6',
                    magenta: '#a855f7',
                    cyan: '#06b6d4',
                    white: '#e0e0e0',
                    brightBlack: '#6b7280',
                    brightRed: '#f87171',
                    brightGreen: '#34d399',
                    brightYellow: '#fbbf24',
                    brightBlue: '#60a5fa',
                    brightMagenta: '#c084fc',
                    brightCyan: '#22d3ee',
                    brightWhite: '#f9fafb'
                },
                scrollback: 10000
            });
            tab.fitAddon = new FitAddon.FitAddon();
            tab.term.loadAddon(tab.fitAddon);
            tab.term.open(container);
            tab._onDataDisposable = tab.term.onData(function(data) { if (tab.ws && tab.ws.readyState === WebSocket.OPEN) tab.ws.send(JSON.stringify({ type: 'input', data: data })); });
            tab._onResizeDisposable = tab.term.onResize(function(dim) { if (tab.ws && tab.ws.readyState === WebSocket.OPEN) tab.ws.send(JSON.stringify({ type: 'resize', cols: dim.cols, rows: dim.rows })); });

            setTimeout(function() {
                try { tab.fitAddon.fit(); } catch(e) {}
                connectSSH(tab, srv);
            }, 100);
        }

        function connectSSH(tab, srv) {
            var statusEl = tab.statusEl;
            var overlayEl = tab.overlayEl;
            if (overlayEl) overlayEl.classList.remove('active');
            var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var url = protocol + '//' + location.host + '/ws/remote-host?token=' + encodeURIComponent(sessionToken) + '&hostId=' + encodeURIComponent(srv.id) + '&cols=' + tab.term.cols + '&rows=' + tab.term.rows;
            tab.ws = new WebSocket(url);
            tab._pingInterval = setInterval(function() {
                if (tab.ws && tab.ws.readyState === WebSocket.OPEN) {
                    tab.ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 25000);
            tab.ws.onmessage = function(ev) {
                try {
                    var msg = JSON.parse(ev.data);
                    if (msg.type === 'data') { tab.term.write(msg.data); }
                    else if (msg.type === 'connected') {
                        tab.status = 'connected';
                        statusEl.textContent = 'Connected';
                        statusEl.className = 'terminal-status connected';
                        if (overlayEl) overlayEl.classList.remove('active');
                        tab.term.focus();
                        renderTabs();
                        renderHome();
                    }
                    else if (msg.type === 'disconnected') {
                        tab.status = 'disconnected';
                        statusEl.textContent = 'Disconnected';
                        statusEl.className = 'terminal-status error';
                        tab.ws = null;
                        if (tab._pingInterval) { clearInterval(tab._pingInterval); tab._pingInterval = null; }
                        if (overlayEl) overlayEl.classList.add('active');
                        renderTabs();
                        renderHome();
                    }
                    else if (msg.type === 'error') {
                        tab.status = 'error';
                        statusEl.textContent = msg.message;
                        statusEl.className = 'terminal-status error';
                        tab.ws = null;
                        if (tab._pingInterval) { clearInterval(tab._pingInterval); tab._pingInterval = null; }
                        if (overlayEl) overlayEl.classList.add('active');
                        renderTabs();
                        renderHome();
                    }
                } catch(_){}
            };
            tab.ws.onclose = function() {
                if (tab._pingInterval) { clearInterval(tab._pingInterval); tab._pingInterval = null; }
                if (tab.status === 'connected' || tab.status === 'connecting') {
                    tab.status = 'disconnected';
                    statusEl.textContent = 'Connection closed';
                    statusEl.className = 'terminal-status error';
                    tab.ws = null;
                    if (overlayEl) overlayEl.classList.add('active');
                    renderTabs();
                    renderHome();
                }
            };
            tab.ws.onerror = function() {
                tab.status = 'error';
                statusEl.textContent = 'Connection error';
                statusEl.className = 'terminal-status error';
            };
        }

        function reconnectTab(tabId) {
            var tab = null;
            for (var i = 0; i < tabs.length; i++) { if (tabs[i].id === tabId) { tab = tabs[i]; break; } }
            if (!tab || !tab.serverId) return;
            var srv = null;
            for (var i = 0; i < servers.length; i++) { if (servers[i].id === tab.serverId) { srv = servers[i]; break; } }
            if (!srv) return;
            if (tab.ws) { try { tab.ws.close(); } catch(_){} tab.ws = null; }
            tab.status = 'connecting';
            tab.statusEl.textContent = 'Reconnecting...';
            tab.statusEl.className = 'terminal-status connecting';
            if (tab.overlayEl) tab.overlayEl.classList.remove('active');
            renderTabs();
            connectSSH(tab, srv);
        }

        function switchTab(tabId) {
            activeTabId = tabId;
            showTerminalView();
            for (var i = 0; i < tabs.length; i++) {
                var el = document.getElementById('term-' + tabs[i].id);
                if (el) {
                    if (tabs[i].id === tabId) el.classList.add('active');
                    else el.classList.remove('active');
                }
            }
            var at = null;
            for (var i = 0; i < tabs.length; i++) { if (tabs[i].id === tabId) { at = tabs[i]; break; } }
            if (at && at.fitAddon) {
                setTimeout(function() { try { at.fitAddon.fit(); } catch(e) {} if (at.term) at.term.focus(); }, 50);
            }
            renderTabs();
        }

        function closeTab(tabId, ev) {
            if (ev) ev.stopPropagation();
            var idx = -1;
            for (var i = 0; i < tabs.length; i++) { if (tabs[i].id === tabId) { idx = i; break; } }
            if (idx === -1) return;
            var tab = tabs[idx];
            if (tab._pingInterval) { clearInterval(tab._pingInterval); tab._pingInterval = null; }
            if (tab.ws) { try { tab.ws.send(JSON.stringify({ type: 'disconnect' })); } catch(_){} tab.ws.close(); }
            if (tab.term) tab.term.dispose();
            var el = document.getElementById('term-' + tab.id);
            if (el) el.remove();
            tabs.splice(idx, 1);
            saveTabs();
            if (activeTabId === tabId) {
                if (tabs.length > 0) switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
                else showHomeView();
            }
            renderTabs();
        }

        function renderTabs() {
            var bar = document.getElementById('tab-bar');
            if (tabs.length === 0) { bar.classList.remove('visible'); bar.innerHTML = ''; return; }
            bar.classList.add('visible');
            var homeActive = isHomeVisible();
            var html = '<div class="tab-home' + (homeActive ? ' active-view' : '') + '" id="tab-home-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Servers</div>';
            html += '<div class="tab-add" id="tab-add-btn" title="New connection">+</div>';
            html += '<div class="tab-transfer" id="tab-transfer-btn" title="File Transfer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> Transfer</div>';

            var groups = {};
            var groupOrder = [];
            for (var i = 0; i < tabs.length; i++) {
                var g = tabs[i].groupName || 'Default';
                if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
                groups[g].push(tabs[i]);
            }

            for (var gi = 0; gi < groupOrder.length; gi++) {
                var gName = groupOrder[gi];
                var gTabs = groups[gName];
                if (groupOrder.length > 1) {
                    html += '<div class="tab-group-sep"><span>' + esc(gName) + '</span><span class="tab-group-count">' + gTabs.length + '</span></div>';
                }
                for (var i = 0; i < gTabs.length; i++) {
                    var t = gTabs[i];
                    var label = t.displayName || t.serverName;
                    html += '<div class="tab' + (t.id === activeTabId ? ' active' : '') + '" data-tab="' + t.id + '" title="' + esc(t.serverName) + ' (' + esc(t.serverUsername || '') + '@' + esc(t.serverHost || '') + ')"><span class="tab-dot ' + t.status + '"></span><span class="tab-label">' + esc(label) + '</span><span class="tab-close" data-close="' + t.id + '">&times;</span></div>';
                }
            }
            bar.innerHTML = html;
        }

        function showAddModal() {
            document.getElementById('srv-id').value = '';
            document.getElementById('srv-name').value = '';
            document.getElementById('srv-host').value = '';
            document.getElementById('srv-port').value = '22';
            document.getElementById('srv-username').value = '';
            document.getElementById('srv-auth').value = 'password';
            document.getElementById('srv-password').value = '';
            document.getElementById('srv-password').placeholder = 'Enter password';
            document.getElementById('srv-key').value = '';
            document.getElementById('srv-group').value = 'Default';
            document.getElementById('srv-tags').value = '';
            document.getElementById('modal-title').textContent = 'Add Server';
            document.getElementById('test-conn-result').textContent = '';
            onAuthChange();
            document.getElementById('modal-server').classList.add('active');
        }

        function editServer(id) {
            var s = null;
            for (var i = 0; i < servers.length; i++) { if (servers[i].id === id) { s = servers[i]; break; } }
            if (!s) return;
            document.getElementById('srv-id').value = s.id;
            document.getElementById('srv-name').value = s.name;
            document.getElementById('srv-host').value = s.host;
            document.getElementById('srv-port').value = s.port;
            document.getElementById('srv-username').value = s.username;
            document.getElementById('srv-auth').value = s.authType;
            document.getElementById('srv-password').value = '';
            document.getElementById('srv-password').placeholder = 'Enter to change';
            document.getElementById('srv-key').value = '';
            document.getElementById('srv-group').value = s.groupName || 'Default';
            document.getElementById('srv-tags').value = (s.tags || []).join(', ');
            document.getElementById('modal-title').textContent = 'Edit Server';
            document.getElementById('test-conn-result').textContent = '';
            onAuthChange();
            document.getElementById('modal-server').classList.add('active');
        }

        function closeModal() { document.getElementById('modal-server').classList.remove('active'); }
        function onAuthChange() {
            var t = document.getElementById('srv-auth').value;
            document.getElementById('srv-password-group').style.display = t === 'password' ? 'block' : 'none';
            document.getElementById('srv-key-group').style.display = t === 'key' ? 'block' : 'none';
        }

        function saveServer() {
            var id = document.getElementById('srv-id').value;
            var body = {
                id: id || undefined,
                name: document.getElementById('srv-name').value.trim(),
                host: document.getElementById('srv-host').value.trim(),
                port: parseInt(document.getElementById('srv-port').value, 10) || 22,
                username: document.getElementById('srv-username').value.trim(),
                authType: document.getElementById('srv-auth').value,
                password: document.getElementById('srv-password').value,
                sshKey: document.getElementById('srv-key').value,
                groupName: document.getElementById('srv-group').value.trim() || 'Default',
                tags: document.getElementById('srv-tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean)
            };
            if (!body.name || !body.host || !body.username) { alert('Fill in all required fields.'); return; }
            if (!id && body.authType === 'password' && !body.password) { alert('Password is required.'); return; }
            api('POST', '/api/v1/remote-host/configs', body).then(function(data) {
                if (!data.success) { alert(data.error); return; }
                closeModal();
                loadServers().then(function() { renderHome(); renderTabs(); });
            });
        }

        function deleteServer(id, name) {
            if (!confirm('Delete server "' + name + '"?')) return;
            api('DELETE', '/api/v1/remote-host/configs/' + id).then(function() {
                loadServers().then(function() { renderHome(); renderTabs(); });
            });
        }

        function showContextMenu(ev, serverId) {
            ev.preventDefault(); ev.stopPropagation();
            ctxServerId = serverId;
            var menu = document.getElementById('context-menu');
            menu.style.left = ev.clientX + 'px'; menu.style.top = ev.clientY + 'px';
            menu.classList.add('show');
        }
        function hideContextMenu() { document.getElementById('context-menu').classList.remove('show'); ctxServerId = null; }

        document.getElementById('main-content').addEventListener('click', function(e) {
            var groupCard = e.target.closest('.group-card');
            if (groupCard) {
                var g = groupCard.dataset.group;
                if (g) { activeGroupFilter = activeGroupFilter === g ? null : g; renderHome(); }
                return;
            }
            var hostCard = e.target.closest('.host-card');
            if (hostCard) {
                if (e.target.closest('.edit-btn')) { editServer(hostCard.dataset.id); return; }
                if (e.target.closest('.delete-btn')) { var s = null; for (var i = 0; i < servers.length; i++) { if (servers[i].id === hostCard.dataset.id) { s = servers[i]; break; } } if (s) deleteServer(s.id, s.name); return; }
                connectToServer(hostCard.dataset.id);
                return;
            }
        });
        document.getElementById('main-content').addEventListener('dblclick', function(e) {
            var groupCard = e.target.closest('.group-card');
            if (groupCard) {
                var g = groupCard.dataset.group;
                if (g) { activeGroupFilter = g; renderHome(); var hosts = servers.filter(function(s) { return (s.groupName || 'Default') === g; }); if (hosts.length) connectToServer(hosts[0].id); }
            }
        });
        document.getElementById('main-content').addEventListener('contextmenu', function(e) {
            var hostCard = e.target.closest('.host-card');
            if (hostCard) showContextMenu(e, hostCard.dataset.id);
        });
        document.getElementById('search-input').addEventListener('input', renderHome);
        document.getElementById('btn-new-host').addEventListener('click', showAddModal);

        // === FILE TRANSFER ===
        var ftFiles = [];
        var ftUploading = false;

        function openFileTransferModal() {
            var sel = document.getElementById('ft-host');
            sel.innerHTML = servers.map(function(s) { return '<option value="' + esc(s.id) + '">' + esc(s.name) + ' (' + esc(s.host) + ')</option>'; }).join('');
            // Pre-select active tab's server
            if (activeTabId) {
                var t = null;
                for (var i = 0; i < tabs.length; i++) { if (tabs[i].id === activeTabId) { t = tabs[i]; break; } }
                if (t) sel.value = t.serverId;
            }
            ftFiles = [];
            document.getElementById('ft-file-list').innerHTML = '';
            document.getElementById('ft-remote-path').value = '/tmp';
            document.getElementById('ft-progress').style.display = 'none';
            document.getElementById('ft-result').style.display = 'none';
            document.getElementById('ft-upload-btn').disabled = true;
            document.getElementById('modal-file-transfer').classList.add('active');
        }
        function closeFileTransferModal() { document.getElementById('modal-file-transfer').classList.remove('active'); }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1073741824).toFixed(1) + ' GB';
        }

        function renderFtFileList() {
            var el = document.getElementById('ft-file-list');
            if (ftFiles.length === 0) { el.innerHTML = ''; document.getElementById('ft-upload-btn').disabled = true; return; }
            document.getElementById('ft-upload-btn').disabled = false;
            el.innerHTML = ftFiles.map(function(f, i) {
                return '<div class="upload-file-item"><span class="file-name">' + esc(f.name) + '</span><span class="file-size">' + formatSize(f.size) + '</span><span class="file-remove" data-idx="' + i + '">&times;</span></div>';
            }).join('');
        }

        function addFtFiles(fileList) {
            for (var i = 0; i < fileList.length; i++) {
                var exists = false;
                for (var j = 0; j < ftFiles.length; j++) {
                    if (ftFiles[j].name === fileList[i].name && ftFiles[j].size === fileList[i].size) { exists = true; break; }
                }
                if (!exists) ftFiles.push(fileList[i]);
            }
            renderFtFileList();
        }

        function uploadFtFiles() {
            if (ftUploading || ftFiles.length === 0) return;
            var hostConfigId = document.getElementById('ft-host').value;
            var remotePath = document.getElementById('ft-remote-path').value.trim();
            if (!hostConfigId || !remotePath) { alert('Select a host and enter remote path.'); return; }

            ftUploading = true;
            var progress = document.getElementById('ft-progress');
            var fill = document.getElementById('ft-progress-fill');
            var text = document.getElementById('ft-progress-text');
            var result = document.getElementById('ft-result');
            var uploadBtn = document.getElementById('ft-upload-btn');
            progress.style.display = 'block';
            result.style.display = 'none';
            uploadBtn.disabled = true;

            var completed = 0;
            var total = ftFiles.length;
            var errors = [];

            function uploadNext() {
                if (completed >= total) {
                    ftUploading = false;
                    progress.style.display = 'none';
                    result.style.display = 'block';
                    if (errors.length === 0) {
                        result.className = 'upload-result success';
                        result.textContent = 'All ' + total + ' file(s) uploaded successfully.';
                    } else {
                        result.className = 'upload-result error';
                        result.textContent = (total - errors.length) + '/' + total + ' uploaded. Errors: ' + errors.join(', ');
                    }
                    uploadBtn.disabled = false;
                    return;
                }
                var f = ftFiles[completed];
                var pct = Math.round((completed / total) * 100);
                fill.style.width = pct + '%';
                text.textContent = 'Uploading ' + (completed + 1) + '/' + total + ': ' + f.name;

                var formData = new FormData();
                formData.append('file', f);
                formData.append('hostConfigId', hostConfigId);
                var fileName = f.name;
                var fullPath = remotePath.replace(/\/+$/, '') + '/' + fileName;
                formData.append('remotePath', fullPath);

                fetch('/api/v1/remote-host/sftp/upload', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + sessionToken },
                    body: formData
                }).then(function(r) { return r.json(); }).then(function(data) {
                    if (!data.success) errors.push(fileName);
                    completed++;
                    uploadNext();
                }).catch(function() {
                    errors.push(fileName);
                    completed++;
                    uploadNext();
                });
            }
            uploadNext();
        }

        function browseRemotePath() {
            var hostConfigId = document.getElementById('ft-host').value;
            var currentPath = document.getElementById('ft-remote-path').value.trim() || '/';
            if (!hostConfigId) { alert('Select a host first.'); return; }
            api('POST', '/api/v1/remote-host/sftp/list', { hostConfigId: hostConfigId, path: currentPath }).then(function(data) {
                if (!data.success) { alert(data.error || 'Failed to list directory.'); return; }
                var items = data.data || [];
                var dirs = items.filter(function(i) { return i.isDir; }).sort(function(a, b) { return a.name.localeCompare(b.name); });
                var html = '<div style="max-height:300px;overflow-y:auto;">';
                html += '<div class="upload-file-item" style="cursor:pointer;" data-path="' + esc(currentPath.replace(/\/[^\/]+\/?$/, '') || '/') + '"><span class="file-name" style="color:var(--prometheus-orange);">.. (parent)</span></div>';
                dirs.forEach(function(d) {
                    var p = currentPath.replace(/\/+$/, '') + '/' + d.name;
                    html += '<div class="upload-file-item" style="cursor:pointer;" data-path="' + esc(p) + '"><span class="file-name" style="color:var(--prometheus-orange);">' + esc(d.name) + '/</span></div>';
                });
                html += '</div>';
                var overlay = document.createElement('div');
                overlay.className = 'modal-overlay active';
                overlay.id = 'ft-browse-overlay';
                overlay.innerHTML = '<div class="modal-dialog" style="width:400px;"><div class="modal-header"><h3>Browse: ' + esc(currentPath) + '</h3><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button></div><div class="modal-body" style="padding:8px;">' + html + '</div></div>';
                document.body.appendChild(overlay);
                overlay.addEventListener('click', function(e) {
                    var item = e.target.closest('.upload-file-item');
                    if (item && item.dataset.path) {
                        document.getElementById('ft-remote-path').value = item.dataset.path;
                        overlay.remove();
                    }
                });
            });
        }

        document.getElementById('tab-bar').addEventListener('click', function(e) {
            if (e.target.closest('#tab-transfer-btn')) { openFileTransferModal(); return; }
            var closeBtn = e.target.closest('.tab-close');
            if (closeBtn) { closeTab(closeBtn.dataset.close, e); return; }
            var homeBtn = e.target.closest('.tab-home');
            if (homeBtn) { showHomeView(); return; }
            var addBtn = e.target.closest('.tab-add');
            if (addBtn) { showHomeView(); return; }
            var tab = e.target.closest('.tab');
            if (tab) switchTab(tab.dataset.tab);
        });
        document.getElementById('tab-bar').addEventListener('dblclick', function(e) {
            var tab = e.target.closest('.tab');
            if (tab && !e.target.closest('.tab-close')) startRenameTab(tab.dataset.tab, tab);
        });
        document.getElementById('tab-bar').addEventListener('contextmenu', function(e) {
            var tab = e.target.closest('.tab');
            if (tab) {
                e.preventDefault(); e.stopPropagation();
                ctxTabId = tab.dataset.tab;
                var menu = document.getElementById('tab-context-menu');
                menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
                menu.classList.add('show');
            }
        });

        function startRenameTab(tabId, tabEl) {
            var tab = null;
            for (var i = 0; i < tabs.length; i++) { if (tabs[i].id === tabId) { tab = tabs[i]; break; } }
            if (!tab) return;
            var label = tabEl.querySelector('.tab-label');
            if (!label) return;
            var currentName = tab.displayName || tab.serverName;
            var input = document.createElement('input');
            input.type = 'text';
            input.className = 'tab-rename-input';
            input.value = currentName;
            label.replaceWith(input);
            input.focus();
            input.select();
            function finish() {
                var newName = input.value.trim();
                if (newName && newName !== tab.serverName) {
                    tab.displayName = newName;
                    setTabDisplayName(tab.serverId, newName);
                } else {
                    tab.displayName = '';
                    setTabDisplayName(tab.serverId, '');
                }
                saveTabs();
                renderTabs();
            }
            input.addEventListener('blur', finish);
            input.addEventListener('keydown', function(ev) {
                if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
                if (ev.key === 'Escape') { input.value = tab.serverName; input.blur(); }
            });
        }

        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
        document.getElementById('modal-save-btn').addEventListener('click', saveServer);
        document.getElementById('srv-auth').addEventListener('change', onAuthChange);

        document.getElementById('test-conn-btn').addEventListener('click', function() {
            var btn = this;
            var result = document.getElementById('test-conn-result');
            btn.disabled = true; btn.textContent = 'Testing...'; result.textContent = ''; result.style.color = '';
            var body = {
                host: document.getElementById('srv-host').value.trim(),
                port: document.getElementById('srv-port').value,
                username: document.getElementById('srv-username').value.trim(),
                authType: document.getElementById('srv-auth').value,
                password: document.getElementById('srv-password').value,
                sshKey: document.getElementById('srv-key').value
            };
            if (!body.host || !body.username) {
                result.textContent = 'Host and username are required.'; result.style.color = 'var(--error)';
                btn.disabled = false; btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Test Connection';
                return;
            }
            api('POST', '/api/v1/remote-host/test-connection', body).then(function(data) {
                result.textContent = data.message; result.style.color = data.success ? 'var(--success)' : 'var(--error)';
            }).catch(function() { result.textContent = 'Request failed.'; result.style.color = 'var(--error)'; });
            btn.disabled = false; btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Test Connection';
        });

        document.getElementById('context-menu').addEventListener('click', function(e) {
            var item = e.target.closest('.context-menu-item');
            if (!item || !ctxServerId) return;
            var action = item.dataset.action;
            if (action === 'connect') connectToServer(ctxServerId);
            else if (action === 'connect-duplicate') connectToServer(ctxServerId);
            else if (action === 'edit') editServer(ctxServerId);
            else if (action === 'delete') { var s = null; for (var i = 0; i < servers.length; i++) { if (servers[i].id === ctxServerId) { s = servers[i]; break; } } if (s) deleteServer(s.id, s.name); }
            hideContextMenu();
        });
        document.getElementById('tab-context-menu').addEventListener('click', function(e) {
            var item = e.target.closest('.context-menu-item');
            if (!item || !ctxTabId) return;
            var action = item.dataset.action;
            var tab = null;
            for (var i = 0; i < tabs.length; i++) { if (tabs[i].id === ctxTabId) { tab = tabs[i]; break; } }
            if (action === 'tab-rename') {
                if (tab) {
                    var tabEl = document.querySelector('.tab[data-tab="' + ctxTabId + '"]');
                    if (tabEl) startRenameTab(ctxTabId, tabEl);
                }
            } else if (action === 'tab-duplicate') {
                if (tab) connectToServer(tab.serverId, tab.displayName || '');
            } else if (action === 'tab-reset-name') {
                if (tab) { tab.displayName = ''; setTabDisplayName(tab.serverId, ''); saveTabs(); renderTabs(); }
            } else if (action === 'tab-close') {
                if (tab) closeTab(ctxTabId);
            }
            hideTabContextMenu();
        });
        function hideTabContextMenu() { document.getElementById('tab-context-menu').classList.remove('show'); ctxTabId = null; }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.context-menu')) { hideContextMenu(); hideTabContextMenu(); }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                hideContextMenu();
                hideTabContextMenu();
                if (!isHomeVisible()) showHomeView();
            }
        });
        window.addEventListener('resize', function() {
            for (var i = 0; i < tabs.length; i++) { if (tabs[i].fitAddon) try { tabs[i].fitAddon.fit(); } catch(e) {} }
        });

        document.getElementById('terminal-wrapper').addEventListener('click', function(e) {
            var btn = e.target.closest('.reconnect-btn');
            if (btn && btn.dataset.reconnect) reconnectTab(btn.dataset.reconnect);
        });

        // File Transfer modal events
        document.getElementById('ft-close-btn').addEventListener('click', closeFileTransferModal);
        document.getElementById('ft-cancel-btn').addEventListener('click', closeFileTransferModal);
        document.getElementById('ft-upload-btn').addEventListener('click', uploadFtFiles);
        document.getElementById('ft-browse-btn').addEventListener('click', browseRemotePath);
        document.getElementById('ft-dropzone').addEventListener('click', function() { document.getElementById('ft-file-input').click(); });
        document.getElementById('ft-file-input').addEventListener('change', function(e) { addFtFiles(e.target.files); e.target.value = ''; });
        document.getElementById('ft-dropzone').addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('dragover'); });
        document.getElementById('ft-dropzone').addEventListener('dragleave', function() { this.classList.remove('dragover'); });
        document.getElementById('ft-dropzone').addEventListener('drop', function(e) { e.preventDefault(); this.classList.remove('dragover'); addFtFiles(e.dataTransfer.files); });
        document.getElementById('ft-file-list').addEventListener('click', function(e) {
            var rm = e.target.closest('.file-remove');
            if (rm) { ftFiles.splice(parseInt(rm.dataset.idx), 1); renderFtFileList(); }
        });

        loadServers().then(function() {
            renderHome();
            renderTabs();
            restoreTabs();
        });
    })();
    </script>
</body>
</html>
